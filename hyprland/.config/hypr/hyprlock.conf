# SOURCE YOUR COLORS
source = ~/.config/theme/colors.conf

# BACKGROUND
background {
    monitor =
    path = ~/.cache/current_wallpaper
    blur_passes = 3
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

# TIME
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%-I:%M%p")"
    color = $rosewater # Replaced static yellow
    font_size = 120
    font_family = SF Pro Display Bold
    position = 0, -120
    halign = center
    valign = top
}

# DAY-DATE-MONTH
label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date '+%A, %d %B')</span>"
    color = $base_bg # Replaced static grey
    font_size = 30
    font_family = SF Pro Display Bold
    position = 0, 220
    halign = center
    valign = center
}

# LOGO
image {
    monitor =
    path = ~/.config/hypr/user.png
    size = 150
    rounding = -1
    border_size = 4
    border_color = $text-main # Replaced static grey border
    halign = center
    valign = center
    position = 0, 100
}

# USER
label {
    monitor =
    text = Hello, $USER
    color = $text # Replaced static white
    font_size = 25
    font_family = SF Pro Display Bold
    position = 0, -70
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 290, 60
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = $base-bg # Using your rgba base-bg from theme
    font_color = $text-main
    fade_on_empty = false
    font_family = SF Pro Display Bold
    placeholder_text = <i><span foreground="##ffffff99">Use Me</span></i>
    hide_input = false
    position = 0, -140
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/hypr/Scripts/songdetail.sh)" 
    color = $rosewater # Replaced static beige
    font_size = 16
    font_family = JetBrains Mono Nerd, SF Pro Display Bold
    position = 0, 80
    halign = center
    valign = bottom
}